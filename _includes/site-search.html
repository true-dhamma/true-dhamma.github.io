<style>
  /* 1. 隐藏侧边栏，强制内容全宽，清理无用分享组件 */
  .aside { display: none !important; }
  .content { width: 100% !important; max-width: 100% !important; margin: 0 !important; }
  
  .share, .share-buttons, .page__share, .page-meta, .post-meta, 
  .author-profile, .social-share, .post-actions, .article__share {
    display: none !important;
  }

  /* 2. 主页面结构 */
  .search-page-wrapper {
    display: flex;
    flex-direction: column;
    width: 100%;
    margin-bottom: 40px;
    background: transparent;
  }

  .search-trigger-container {
    margin-bottom: 24px;
  }

  /* 假的搜索框 */
  .fake-search-box {
    display: flex;
    align-items: center;
    justify-content: space-between;
    background-color: #fcfcfc;
    border: 1px solid #d1d5da;
    border-radius: 0;
    padding: 10px 20px;
    color: #333;
    cursor: pointer;
    font-size: 19px;
    transition: all 0.2s ease;
    width: 100%;
    box-sizing: border-box;
  }

  .fake-search-box:hover {
    border-color: #0366d6;
    background-color: #fff;
    box-shadow: 0 0 0 3px rgba(3, 102, 214, 0.1); 
  }

  .search-box-left {
    display: flex;
    align-items: center;
  }

  .search-box-left svg {
    width: 22px;
    height: 22px;
    margin-right: 24px;
    stroke: #888;
    transition: stroke 0.2s ease;
  }
  
  .fake-search-box:hover .search-box-left svg {
    stroke: #0366d6;
  }

  .fake-search-box .shortcut-key {
    font-size: 15px;
    background-color: transparent;
    border: 1px solid #d1d5da;
    padding: 6px 18px;
    border-radius: 0;
    color: #888;
    font-family: "SF Mono", Menlo, Consolas, monospace;
    letter-spacing: 1.5px;
    transition: all 0.2s ease;
  }

  .fake-search-box:hover .shortcut-key {
    color: #0366d6;
    border-color: #0366d6;
  }

  /* 3. FastGPT 容器（核心放大逻辑与去灰底逻辑） */
  .fastgpt-container {
    width: 100%;
    height: 750px;
    max-height: 85vh;
    /* 核心裁切法：强制给外层圆角+隐藏溢出，裁掉 FastGPT 四个角的丑陋灰底 */
    border-radius: 12px; 
    overflow: hidden; 
    background-color: #ffffff;
    border: 1px solid #eaeaea; /* 非常淡的一层边框增加质感 */
  }

  .fastgpt-container iframe {
    /* 
      1.1 倍放大而不超宽度的核心数学公式：
      原本需要 100% 的宽度，被放大 1.1 倍后会溢出。
      因此设定自身物理宽度为 100% / 1.1 = 90.909%，这样放大 1.1 倍后刚好是 100%
    */
    width: calc(100% / 1.1) !important;
    height: calc(100% / 1.1) !important;
    transform: scale(1.1);
    transform-origin: top left;
    -webkit-transform: scale(1.1);
    -webkit-transform-origin: top left;
    border: none !important;
    display: block;
    background-color: transparent !important;
  }

  /* 4. 弹出层 Modal */
  .modal-overlay {
    display: none;
    position: fixed;
    top: 0; left: 0; right: 0; bottom: 0;
    background-color: rgba(0, 0, 0, 0.5);
    backdrop-filter: blur(3px);
    z-index: 99999;
    justify-content: center;
    align-items: flex-start;
    padding-top: 10vh;
  }

  .modal-overlay.active {
    display: flex;
  }

  .search-modal {
    background-color: #fff;
    width: 100%;
    max-width: 700px;
    /* 设定固定的高度，使窗口一打开就有霸气稳重的比例 */
    height: 600px; 
    max-height: 80vh;
    border-radius: 0;
    border: 1px solid #a8adac;
    box-shadow: 0 10px 40px rgba(0,0,0,0.2);
    display: flex;
    flex-direction: column;
    overflow: hidden;
    transform: translateY(-20px);
    opacity: 0;
    transition: all 0.2s ease;
  }

  .modal-overlay.active .search-modal {
    transform: translateY(0);
    opacity: 1;
  }

  .search-modal-header {
    display: flex;
    align-items: center;
    padding: 15px 20px;
    border-bottom: 1px solid #a8adac;
    background: #fff;
    flex-shrink: 0; /* 防止 Header 被压缩 */
  }

  .search-modal-header input {
    flex-grow: 1;
    width: 100%;
    border: none !important;
    outline: none !important;
    font-size: 20px;
    background: transparent;
    color: #34495e;
    padding: 0;
  }
  
  .search-modal-header input:focus {
    outline: none !important;
    box-shadow: none !important;
  }

  /* 彻底修复的关闭按钮：使用不会丢的 SVG，并且阻止它被挤压 */
  .search-modal-close {
    flex-shrink: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    width: 32px;
    height: 32px;
    background: transparent !important;
    border: none !important;
    cursor: pointer;
    color: #888 !important;
    margin-left: 20px;
    padding: 0;
    transition: color 0.2s ease;
    box-shadow: none !important;
  }

  .search-modal-close svg {
    width: 28px;
    height: 28px;
  }

  .search-modal-close:hover {
    color: #333 !important;
    box-shadow: none !important;
  }

  /* Modal 结果内容区，自动撑满剩下的高度 */
  .search-modal-body {
    flex-grow: 1; 
    overflow-y: auto;
    padding: 20px 25px;
    background-color: #fff;
  }

  .item--result mark {
    background-color: #fcf8e3;
    padding: 0 3px;
    color: #8a6d3b;
    font-weight: bold;
  }
  .list--results {
    list-style: none;
    padding: 0;
    margin: 0;
  }
  .item--result {
    margin-bottom: 18px;
    padding-bottom: 18px;
    border-bottom: 1px solid #f0f0f0;
  }
  .item--result:last-child {
    border-bottom: none;
  }
  .item--result h4 {
    margin: 0 0 8px 0;
    font-size: 18px;
  }
  .item--result h4 a {
    text-decoration: none;
    color: #3A77D8; 
  }
  .item--result h4 a:hover {
    text-decoration: underline;
  }
  .item--result p {
    margin: 0;
    font-size: 15px;
    color: #555;
    line-height: 1.6;
  }

  @media (max-width: 768px) {
    .search-page-wrapper { margin-bottom: 20px; }
    .fake-search-box { font-size: 16px; padding: 12px 15px; }
    .modal-overlay { padding-top: 0; }
    .search-modal { max-width: 100%; height: 100vh; max-height: 100vh; border: none; }
    .fake-search-box .shortcut-key { display: none; }
  }
</style>

      <div class="search-box-left">

        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="square" stroke-linejoin="miter">
          <circle cx="11" cy="11" r="8"></circle>

  <div class="fastgpt-container">

<script type="text/javascript" src="{{ "/assets/scripts/fetch.js" | relative_url }}"></script>
<script type="text/javascript">
  document.addEventListener("DOMContentLoaded", () => {
    const isMac = navigator.platform.toUpperCase().indexOf('MAC') >= 0;
    const shortcutText = document.querySelector('.shortcut-key');
    if (shortcutText) {
      shortcutText.textContent = isMac ? '⌘ K' : 'Ctrl K';
    }
  });

  const CACHE_DURATION_IN_DAYS = 15;
  const endpoint = '{{ "/assets/search.json" | relative_url }}';
  const pages =[];
  const searchDataKey = 'search_json_data';
  const timestampKey = 'search_json_timestamp';
  const cacheDuration = CACHE_DURATION_IN_DAYS * 24 * 60 * 60 * 1000;

  function fetchAndCacheData() {
    fetch(endpoint)
      .then(blob => {
        if (!blob.ok) throw new Error(`HTTP error! status: ${blob.status}`);
        return blob.json();
      })
      .then(data => {
        pages.push(...data);
        try {
          localStorage.setItem(searchDataKey, JSON.stringify(data));
          localStorage.setItem(timestampKey, new Date().getTime().toString());
        } catch (e) {
          console.error('Error saving search cache:', e);
        }
      })
      .catch(err => console.error('Error fetching or processing search.json:', err));
  }

  function loadDataFromCache() {
    try {
      const cachedData = localStorage.getItem(searchDataKey);
      const cachedTimestamp = localStorage.getItem(timestampKey);
      const now = new Date().getTime();

      if (cachedData && cachedTimestamp && (now - parseInt(cachedTimestamp, 10) < cacheDuration)) {
        const data = JSON.parse(cachedData);
        pages.push(...data);
      } else {
        fetchAndCacheData();
      }
    } catch (e) {
      fetchAndCacheData();
    }
  }

  loadDataFromCache();

  function debounce(func, wait) {
    let timeout;
    return function(...args) {
      const context = this;
      clearTimeout(timeout);
      timeout = setTimeout(() => func.apply(context, args), wait);
    };
  }

  function findResults(termToMatch, pages) {
    if (!termToMatch.trim()) return[];
    return pages.filter(item => {
      const regex = new RegExp(termToMatch, 'gi');
      const titleMatch = item.title && item.title.match(regex);
      const contentMatch = item.content && item.content.match(regex);
      return titleMatch || contentMatch;
    });
  }

  function displayResults() {
    const searchTerm = this.value;
    const resultsArray = findResults(searchTerm, pages);

    if (resultsArray.length > 0) {
      const html = resultsArray.map(item => {
        const regex = new RegExp(searchTerm, 'gi');
        let finalSnippet = '';
        let sourceForSnippet = '';

        const contentMatch = item.content && item.content.match(regex);
        const excerptMatch = item.excerpt && item.excerpt.match(regex);

        if (contentMatch) {
          sourceForSnippet = item.content;
        } else if (excerptMatch) {
          sourceForSnippet = item.excerpt;
        } else {
          sourceForSnippet = (item.excerpt && item.excerpt.length > 0) ? item.excerpt : item.content;
        }
        
        if (sourceForSnippet) {
          const matchInSource = new RegExp(searchTerm, 'gi').exec(sourceForSnippet);
          if (matchInSource) {
            const keywordIndex = matchInSource.index;
            const snippetRadius = 70;
            const startIndex = Math.max(0, keywordIndex - snippetRadius);
            const endIndex = Math.min(sourceForSnippet.length, keywordIndex + matchInSource[0].length + snippetRadius);
            finalSnippet = sourceForSnippet.substring(startIndex, endIndex);
            if (startIndex > 0) finalSnippet = '...' + finalSnippet;
            if (endIndex < sourceForSnippet.length) finalSnippet = finalSnippet + '...';
          } else {
            finalSnippet = sourceForSnippet.substring(0, 150) + '...';
          }
        }

        const highlightedSnippet = finalSnippet.replace(regex, `<mark>$&</mark>`);
        const highlightedTitle = item.title.replace(regex, `<mark>$&</mark>`);

        return `
          <li class="item item--result">
            <article class="article typeset">
              <h4><a href="${item.url}">${highlightedTitle}</a></h4>
              <p>${highlightedSnippet}</p>
            </article>
          </li>`;
      }).join('');
      resultsList.innerHTML = html;

    } else if (searchTerm.length > 0) {
      resultsList.innerHTML = `<p style="padding: 10px 0; color: #999; font-size: 16px;">抱歉，没有找到相关内容。</p>`;
    } else {
      resultsList.innerHTML = '';
    }
  }

  const field = document.querySelector('#realSearchInput');
  const resultsList = document.querySelector('#modalResultsList');

  field.addEventListener('keyup', debounce(displayResults, 300));
  field.addEventListener('keydown', function(event) {
    if (event.key === 'Enter') event.preventDefault();
  });

  window.openSearchModal = function() {
    const overlay = document.getElementById('searchModalOverlay');
    overlay.classList.add('active');
    field.focus();
    document.body.style.overflow = 'hidden'; 
  }

  window.closeSearchModal = function(event) {
    if (event) {
      event.preventDefault();
      event.stopPropagation();
    }
    const overlay = document.getElementById('searchModalOverlay');
    overlay.classList.remove('active');
    document.body.style.overflow = ''; 
  }

  document.addEventListener('keydown', function(event) {
    if ((event.metaKey || event.ctrlKey) && event.key === 'k') {
      event.preventDefault();
      openSearchModal();
    }
    if (event.key === 'Escape') {
      closeSearchModal();
    }
  });
</script>
